
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission JEET · Premium Batches</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Nunito',sans-serif;
    background:#eef1f7;
    color:#1a1a1a;
  }

  /* HEADER */
  .header{
    background:#0a0a0a;
    padding:18px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .logo-wrap{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo-img{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
  }
  .logo-title{
    font-family:'Rajdhani',sans-serif;
    font-size:28px;
    font-weight:700;
    color:#fff;
    line-height:1;
  }
  .logo-sub{
    font-size:12px;
    color:#ffb57d;
    margin-top:-4px;
  }

  .search-box{
    background:#fff;
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 14px;
    border-radius:30px;
  }
  .search-box input{
    border:none;
    outline:none;
    background:transparent;
    font-size:14px;
  }

  /* HERO BANNER */
  .banner{
    margin:18px auto;
    width:92%;
    height:210px;
    border-radius:26px;
    overflow:hidden;
    box-shadow:0 12px 25px rgba(0,0,0,0.2);
    position:relative;
    cursor:pointer;
  }
  .banner-slide{
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    position:relative;
  }
  .banner-overlay{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:linear-gradient(90deg,rgba(0,0,0,.7),rgba(0,0,0,.3));
  }
  .banner-content{
    position:absolute;
    left:20px;
    bottom:20px;
    color:#fff;
  }
  .tag{
    background:#ffcc66;
    padding:4px 10px;
    border-radius:20px;
    color:#000;
    font-weight:700;
    font-size:12px;
  }
  .b-title{
    font-family:'Rajdhani',sans-serif;
    font-size:34px;
    font-weight:800;
    margin-top:4px;
  }
  .b-sub{
    font-size:18px;
    color:#ffeaaa;
  }
  .price-box{
    position:absolute;
    right:20px;
    bottom:20px;
    background:#fff;
    padding:10px 16px;
    border-radius:16px;
    text-align:center;
  }
  .old{font-size:12px;text-decoration:line-through;color:#d22;}
  .new{font-size:22px;font-weight:800;}

  .dots{
    position:absolute;
    bottom:6px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
  }
  .dot{
    width:8px;height:8px;
    background:#fff6;
    border-radius:10px;
    cursor:pointer;
    transition:0.25s;
  }
  .dot.active{
    width:26px;
    background:#ffcc66;
  }

  /* INFO CARD */
  .info-card{
    margin:20px;
    background:linear-gradient(135deg,#e3f8f3,#c8ebe4);
    border-radius:22px;
    padding:18px;
    display:flex;
    gap:14px;
    align-items:center;
  }

  .alert-card{
    margin:20px;
    background:#fff3e0;
    border-radius:22px;
    padding:20px;
    text-align:center;
    border-left:4px solid #e53935;
  }

  .tg-btn{
    background:#e53935;
    border:none;
    color:#fff;
    width:100%;
    padding:10px;
    border-radius:32px;
    margin-top:10px;
    font-weight:700;
    cursor:pointer;
  }

  .courses-title{
    font-size:22px;
    margin:12px 20px;
    font-weight:800;
  }

  /* GRID */
  .grid{
    padding:0 20px;
    display:grid;
    gap:18px;
  }
  @media(min-width:768px){
    .grid{
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    }
  }

  .card{
    background:#fff;
    border-radius:20px;
    box-shadow:0 6px 16px rgba(0,0,0,0.08);
    cursor:pointer;
    overflow:hidden;
  }
  .thumb{
    height:150px;
    background-size:cover;
    background-position:center;
    position:relative;
  }
  .badge{
    position:absolute;
    top:12px;
    left:12px;
    background:rgba(0,0,0,0.6);
    padding:4px 12px;
    border-radius:14px;
    color:#ffeaa7;
    font-size:12px;
  }
  .price{
    position:absolute;
    bottom:10px;
    right:12px;
    background:#fff;
    padding:6px 12px;
    border-radius:12px;
  }

  .card-body{
    padding:14px;
  }

  /* FOOTER */
  .footer{
    text-align:center;
    padding:30px;
    margin-top:40px;
    background:#0a0a0a;
    color:#ccc;
  }

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-wrap">
    <img src="https://is1-ssl.mzstatic.com/image/thumb/PurpleSource211/v4/ff/ed/33/ffed33f9-6031-1eee-7a0d-d870dee9573e/Placeholder.mill/1200x630wa.jpg" class="logo-img">
    <div>
      <div class="logo-title">MISSION JEET</div>
      <div class="logo-sub">India’s Trusted Coaching</div>
    </div>
  </div>

  <div class="search-box">
    <i class="fa fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search batches...">
  </div>
</div>

<!-- ROTATING BANNER -->
<div class="banner" id="bannerBox">
  <div class="banner-slide" id="bannerSlide"></div>
  <div class="banner-overlay"></div>
  <div class="banner-content" id="bannerContent"></div>
  <div class="price-box" id="priceBox"></div>
  <div class="dots" id="dots"></div>
</div>

<!-- INFO -->
<div class="info-card">
  <span style="font-size:40px;">🏆</span>
  <div>
    <h3>India's Most Trusted Coaching</h3>
    <p>15+ Years of Excellence • 5000+ Top Selections</p>
  </div>
</div>

<!-- ALERT -->
<div class="alert-card">
  <i class="fab fa-telegram" style="font-size:30px;color:#e53935;"></i>
  <h3>Join Official Updates</h3>
  <button class="tg-btn" onclick="window.open('https://t.me/missionjeet_official')">Main Channel</button>
</div>

<h3 class="courses-title">🔥 Our Premium Batches</h3>
<div class="grid" id="courseGrid"></div>

<!-- FOOTER -->
<div class="footer">
  © Mission JEET · All Rights Reserved 2026
</div>

<script>
/* COURSE DATA */
const courses = [
  {
    id:"jee11",
    name:"🏅 DRONA JEE (Class 11)",
    grade:"JEE 2028",
    old:5999,
    price:0,
    validity:"786 days",
    img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4yCGnkrjiyDYUJhNOcqUPVUg2VAx09p_fxA&s"
  },
  {
    id:"neet11",
    name:"🩺 DRONA NEET (Class 11)",
    grade:"NEET 2028",
    old:5999,
    price:0,
    validity:"786 days",
    img:"https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/metaGallery//703442_1_147818_131_drona%20neet%20banner%20website.jpg"
  }
];

/* BANNER ITEMS */
const banners = [
  {
    tag:"LIMITED SEATS",
    title:"DRONA JEE",
    sub:"IIT-JEE 2028",
    old:"₹5999",
    price:"₹0",
    img:"https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/metaGallery//1025998_1_2679626_131_drona%20jee%20banner%20website.jpg"
  },
  {
    tag:"DREAM OF AIIMS?",
    title:"DRONA NEET",
    sub:"NEET 2028",
    old:"₹5999",
    price:"₹0",
    img:"https://dulae92u7241v.cloudfront.net/1772100600/admin_v2/metaGallery//703442_1_147818_131_drona%20neet%20banner%20website.jpg"
  }
];

let index=0;

/* RENDER BANNER */
function loadBanner(){
  const b=banners[index];
  document.getElementById("bannerSlide").style.backgroundImage=`url(${b.img})`;

  document.getElementById("bannerContent").innerHTML=`
    <div class="tag">${b.tag}</div>
    <div class="b-title">${b.title}</div>
    <div class="b-sub">${b.sub}</div>
  `;

  document.getElementById("priceBox").innerHTML=`
    <div class="old">${b.old}</div>
    <div class="new">${b.price}</div>
  `;

  let dots="";
  banners.forEach((_,i)=>dots+=`<div class="dot ${i==index?'active':''}" onclick="goto(${i})"></div>`);
  document.getElementById("dots").innerHTML=dots;
}

function goto(i){
  index=i;
  loadBanner();
}

setInterval(()=>{
  index=(index+1)%banners.length;
  loadBanner();
},3000);

loadBanner();

/* RENDER COURSES */
function loadCourses(){
  const box=document.getElementById("courseGrid");
  box.innerHTML="";
  courses.forEach(c=>{
    box.innerHTML+=`
      <div class="card">
        <div class="thumb" style="background-image:url('${c.img}')">
          <div class="badge">${c.grade}</div>
          <div class="price"><span class="old">₹${c.old}</span><br><span class="new">₹${c.price}</span></div>
        </div>
        <div class="card-body">
          <strong>${c.name}</strong>
          <div style="font-size:12px;color:#555;margin-top:6px;">Validity: ${c.validity}</div>
        </div>
      </div>
    `;
  });
}
loadCourses();

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",e=>{
  const term=e.target.value.toLowerCase();
  const box=document.getElementById("courseGrid");
  box.innerHTML="";
  courses
    .filter(c=>c.name.toLowerCase().includes(term))
    .forEach(c=>{
      box.innerHTML+=`
        <div class="card">
          <div class="thumb" style="background-image:url('${c.img}')">
            <div class="badge">${c.grade}</div>
            <div class="price"><span class="old">₹${c.old}</span><br><span class="new">₹${c.price}</span></div>
          </div>
          <div class="card-body">
            <strong>${c.name}</strong>
            <div style="font-size:12px;color:#555;margin-top:6px;">Validity: ${c.validity}</div>
          </div>
        </div>
      `;
    });
});

/* SECURITY LOCK */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("selectstart",e=>e.preventDefault());
document.addEventListener("dragstart",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
  if(
    e.key==="F12"||
    (e.ctrlKey&&e.shiftKey&&["I","J","C"].includes(e.key.toUpperCase()))||
    (e.ctrlKey&&e.key.toUpperCase()==="U")
  ){
    e.preventDefault();
    e.stopPropagation();
  }
});
</script>

</body>
</html>
